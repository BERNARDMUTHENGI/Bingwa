name: bingwa_hybrid
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core
  provider: ^6.1.2
  dio: ^5.5.0+1
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.3

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # UI & Utility
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

  collection: ^1.18.0

  # USSD & SIM
  ussd_advanced:
    path: local_plugins/ussd_advanced-0.1.2
  sim_data:
    path: local_plugins/sim_data-0.0.2

  # Permissions & SMS
  permission_handler: ^11.3.1
  telephony:
    path: local_plugins/telephony-0.2.0

  # Background tasks
  workmanager: ^0.9.0+3

  # Navigation
  go_router: ^14.2.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/.env
    - assets/bingwa ultra.jpeg   # <-- add this line